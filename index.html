<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini E-Commerce Cart</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    /** @jsx React.createElement */

    const { useState, useMemo } = React;

    const products = [
      { id: 1, name: "MacBook Pro 16", price: 1999, category: "Laptops", image: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=300&h=300&fit=crop", desc: "M3 Pro chip, 18GB RAM, 512GB SSD" },
      { id: 2, name: "iPhone 16 Pro", price: 1199, category: "Smartphones", image: "https://images.unsplash.com/photo-1742891854157-2c9287b8f573?w=300&h=300&fit=crop", desc: "A18 Pro, 48MP camera, titanium body" },
      { id: 3, name: "Sony WH-1000XM6", price: 399, category: "Headphones", image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300&h=300&fit=crop", desc: "Industry-leading ANC, 40hr battery" },
      { id: 4, name: "Apple Watch Ultra 3", price: 799, category: "Smart Watches", image: "https://images.unsplash.com/photo-1546868871-af0de0ae72f2?w=300&h=300&fit=crop", desc: "49mm titanium case, action button" },
      { id: 5, name: "Sony A7 IV Camera", price: 2499, category: "Cameras", image: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=300&h=300&fit=crop", desc: "33MP full-frame, 4K 60fps video" },
      { id: 6, name: "Logitech MX Keys", price: 119, category: "Keyboards", image: "https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=300&h=300&fit=crop", desc: "Wireless, backlit, multi-device" },
      { id: 7, name: "Logitech MX Master 3S", price: 99, category: "Mice", image: "https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?w=300&h=300&fit=crop", desc: "8K DPI, ergonomic, silent clicks" },
      { id: 8, name: "JBL Charge 5", price: 179, category: "Speakers", image: "https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=300&h=300&fit=crop", desc: "30W, IP67, 20hr battery life" },
      { id: 9, name: "Dell XPS 16", price: 1499, category: "Laptops", image: "https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=300&h=300&fit=crop", desc: "Intel Core Ultra 9, OLED touch" },
      { id: 10, name: "Samsung Galaxy Buds3", price: 229, category: "Headphones", image: "https://images.unsplash.com/photo-1603351154351-5e2d0600bb77?w=300&h=300&fit=crop", desc: "ANC, 24-bit hi-fi, blade design" },
      { id: 11, name: "iPad Air M3", price: 899, category: "Tablets", image: "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=300&h=300&fit=crop", desc: "M3 chip, 11-inch Liquid Retina, 128GB" },
      { id: 12, name: "Samsung Galaxy Tab S10", price: 1099, category: "Tablets", image: "https://images.unsplash.com/photo-1589739900243-4b52cd9dd8df?w=300&h=300&fit=crop", desc: "14.6-inch Dynamic AMOLED, S Pen included" },
      { id: 13, name: "PS5 Slim", price: 499, category: "Gaming", image: "https://images.unsplash.com/photo-1606813907291-d86efa9b94db?w=300&h=300&fit=crop", desc: "AMD Ryzen Zen 2, 825GB SSD, DualSense" },
      { id: 14, name: "Xbox Series X", price: 499, category: "Gaming", image: "https://images.unsplash.com/photo-1621259182978-fbf93132d53d?w=300&h=300&fit=crop", desc: "12 TFLOPS, 1TB SSD, Quick Resume" },
      { id: 15, name: "Nintendo Switch OLED", price: 349, category: "Gaming", image: "https://images.unsplash.com/photo-1578303182336-86c8abcbf567?w=300&h=300&fit=crop", desc: "7-inch OLED screen, 64GB internal" },
      { id: 16, name: "Dell UltraSharp 32 4K", price: 1299, category: "Monitors", image: "https://images.unsplash.com/photo-1586210579191-33b45e38fa2c?w=300&h=300&fit=crop", desc: "32-inch 4K IPS, USB-C hub, Delta E&lt;2" },
      { id: 17, name: "LG 34 UltraWide", price: 849, category: "Monitors", image: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=300&h=300&fit=crop", desc: "34-inch WQHD, 160Hz, 1ms, G-Sync" },
      { id: 18, name: "Samsung Odyssey G9", price: 1399, category: "Monitors", image: "https://images.unsplash.com/photo-1593359677879-a4bb92f829d1?w=300&h=300&fit=crop", desc: "49-inch DQHD, 240Hz, 1ms, Neo G9" },
      { id: 19, name: "Canon EOS R5 Mark II", price: 3899, category: "Cameras", image: "https://images.unsplash.com/photo-1502920917128-1aa500764cbd?w=300&h=300&fit=crop", desc: "45MP, 8K 60fps, DIGIC X processor" },
      { id: 20, name: "GoPro Hero 13 Black", price: 449, category: "Cameras", image: "https://images.unsplash.com/photo-1504639725590-34d0984388bd?w=300&h=300&fit=crop", desc: "5.3K 60fps, HyperSmooth 6.0, waterproof" },
      { id: 21, name: "Samsung Galaxy S25 Ultra", price: 1299, category: "Smartphones", image: "https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?w=300&h=300&fit=crop", desc: "Snapdragon 8 Elite, 200MP, S Pen" },
      { id: 22, name: "Google Pixel 10 Pro", price: 999, category: "Smartphones", image: "https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=300&h=300&fit=crop", desc: "Tensor G5, 64MP, 7 years of updates" },
      { id: 23, name: "Samsung Galaxy Watch 7", price: 399, category: "Smart Watches", image: "https://images.unsplash.com/photo-1579586337278-3befd40fd17a?w=300&h=300&fit=crop", desc: "BioActive sensor, 3nm chip, Wear OS" },
      { id: 24, name: "Garmin Forerunner 965", price: 599, category: "Smart Watches", image: "https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=300&h=300&fit=crop", desc: "AMOLED display, maps, training metrics" },
      { id: 25, name: "AirPods Pro 3", price: 249, category: "Headphones", image: "https://images.unsplash.com/photo-1588421357574-87938a86fa28?w=300&h=300&fit=crop", desc: "H3 chip, adaptive ANC, USB-C, Find My" },
      { id: 26, name: "Bose QuietComfort Ultra", price: 429, category: "Headphones", image: "https://images.unsplash.com/photo-1559166630-73a7d0b2cafa?w=300&h=300&fit=crop", desc: "CustomTune ANC, Immersive Audio, 24hr" },
      { id: 27, name: "Razer DeathAdder V4", price: 79, category: "Mice", image: "https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=300&h=300&fit=crop", desc: "Focus Pro 30K, optical switches, 63g" },
      { id: 28, name: "Keychron Q1 Pro", price: 199, category: "Keyboards", image: "https://images.unsplash.com/photo-1595225476474-87563907a212?w=300&h=300&fit=crop", desc: "75% layout, Gateron Jupiter, aluminum" },
      { id: 29, name: "Sonos Era 300", price: 449, category: "Speakers", image: "https://images.unsplash.com/photo-1558089687-f282ffcbc126?w=300&h=300&fit=crop", desc: "Dolby Atmos, spatial audio, WiFi 6" },
      { id: 30, name: "Marshall Stanmore III", price: 379, category: "Speakers", image: "https://images.unsplash.com/photo-1545454675-3531b543be5d?w=300&h=300&fit=crop", desc: "Bluetooth 5.3, 80W, iconic design" }
    ];

    const categories = [...new Set(products.map(p => p.category))];

    function Header({ cartCount, onCartClick }) {
      return (
        <header className="header">
          <div className="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2563eb" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" />
              <line x1="8" y1="21" x2="16" y2="21" />
              <line x1="12" y1="17" x2="12" y2="21" />
            </svg>
            <span>ShopCart</span>
          </div>
          <button className="cart-btn" onClick={onCartClick} aria-label="Open cart">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="9" cy="21" r="1" />
              <circle cx="20" cy="21" r="1" />
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
            </svg>
            {cartCount > 0 && <span className="cart-badge">{cartCount}</span>}
          </button>
        </header>
      );
    }

    function Filters({ search, setSearch, category, setCategory }) {
      return (
        <div className="filters">
          <div className="search-box">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" placeholder="Search products..." value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <select className="category-filter" value={category} onChange={e => setCategory(e.target.value)}>
            <option value="">All Categories</option>
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
      );
    }

    function ProductCard({ product, onAdd }) {
      return (
        <div className="product-card">
          <div className="product-image">
            <img src={product.image} alt={product.name} />
            <span className="category-tag">{product.category}</span>
          </div>
          <div className="product-info">
            <h3>{product.name}</h3>
            <p className="desc">{product.desc}</p>
            <p className="price">₹{product.price.toLocaleString()}</p>
            <button onClick={() => onAdd(product)}>Add to Cart</button>
          </div>
        </div>
      );
    }

    function ProductList({ products, onAdd }) {
      return (
        <section className="product-grid">
          {products.map(p => <ProductCard key={p.id} product={p} onAdd={onAdd} />)}
        </section>
      );
    }

    function CartItem({ item, onUpdateQty, onRemove }) {
      return (
        <div className="cart-item">
          <img src={item.image} alt={item.name} />
          <div className="cart-item-info">
            <h4>{item.name}</h4>
            <p className="cart-item-price">₹{(item.price * item.qty).toLocaleString()}</p>
            <div className="qty-controls">
              <button onClick={() => onUpdateQty(item.id, item.qty - 1)} disabled={item.qty <= 1}>-</button>
              <span>{item.qty}</span>
              <button onClick={() => onUpdateQty(item.id, item.qty + 1)}>+</button>
            </div>
          </div>
          <button className="remove-btn" onClick={() => onRemove(item.id)} title="Remove item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
          </button>
        </div>
      );
    }

    function Cart({ cart, onClose, onUpdateQty, onRemove, onClear }) {
      const totalQty = cart.reduce((s, i) => s + i.qty, 0);
      const totalPrice = cart.reduce((s, i) => s + i.price * i.qty, 0);

      return (
        <div className="cart-overlay" onClick={onClose}>
          <aside className="cart-sidebar" onClick={e => e.stopPropagation()}>
            <div className="cart-header">
              <div>
                <h2>Shopping Cart</h2>
                <p className="cart-subtitle">{cart.length} item{cart.length !== 1 ? 's' : ''} &middot; {totalQty} total</p>
              </div>
              <button className="close-btn" onClick={onClose}>&times;</button>
            </div>
            <div className="cart-items">
              {cart.length === 0 ? (
                <div className="empty-cart">
                  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ddd" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="9" cy="21" r="1" /><circle cx="20" cy="21" r="1" />
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                  </svg>
                  <p>Your cart is empty</p>
                  <span>Add some products to get started!</span>
                </div>
              ) : (
                cart.map(item => <CartItem key={item.id} item={item} onUpdateQty={onUpdateQty} onRemove={onRemove} />)
              )}
            </div>
            {cart.length > 0 && (
              <div className="cart-footer">
                <div className="cart-summary">
                  <div className="summary-row"><span>Total Items</span><span>{cart.length}</span></div>
                  <div className="summary-row"><span>Total Quantity</span><span>{totalQty}</span></div>
                  <div className="summary-row total"><span>Total Price</span><span>₹{totalPrice.toLocaleString()}</span></div>
                </div>
                <button className="checkout-btn" onClick={onClear}>Proceed to Checkout</button>
              </div>
            )}
          </aside>
        </div>
      );
    }

    function App() {
      const [cart, setCart] = useState([]);
      const [cartOpen, setCartOpen] = useState(false);
      const [search, setSearch] = useState("");
      const [category, setCategory] = useState("");

      const cartCount = cart.reduce((s, i) => s + i.qty, 0);

      const filteredProducts = useMemo(() => {
        return products.filter(p => {
          const matchSearch = p.name.toLowerCase().includes(search.toLowerCase()) || p.desc.toLowerCase().includes(search.toLowerCase());
          const matchCategory = !category || p.category === category;
          return matchSearch && matchCategory;
        });
      }, [search, category]);

      function handleAdd(product) {
        const existing = cart.find(i => i.id === product.id);
        if (existing) {
          setCart(cart.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i));
        } else {
          setCart([...cart, { ...product, qty: 1 }]);
        }
      }

      function handleUpdateQty(id, qty) {
        if (qty < 1) return;
        setCart(cart.map(i => i.id === id ? { ...i, qty } : i));
      }

      function handleRemove(id) {
        setCart(cart.filter(i => i.id !== id));
      }

      function handleClear() {
        setCart([]);
        setCartOpen(false);
      }

      return (
        <>
          <Header cartCount={cartCount} onCartClick={() => setCartOpen(true)} />
          <main className="main-content">
            <Filters search={search} setSearch={setSearch} category={category} setCategory={setCategory} />
            {filteredProducts.length === 0 ? (
              <div className="no-results">No products found matching your search.</div>
            ) : (
              <ProductList products={filteredProducts} onAdd={handleAdd} />
            )}
          </main>
          {cartOpen && (
            <Cart
              cart={cart}
              onClose={() => setCartOpen(false)}
              onUpdateQty={handleUpdateQty}
              onRemove={handleRemove}
              onClear={handleClear}
            />
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
